<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Portales</title>

    <link rel="stylesheet" href="css/general.css">
    <link rel="stylesheet" href="css/inicio.css">
</head>

<body>

    <main class="pantalla-inicio">

        <section class="contenido-inicio">

            <h1 class="titulo-inicio">
                Portales
            </h1>

            <p class="pregunta-inicio">
                ¿Cómo te llamas?
            </p>

            <form
                id="formularioNombre"
                class="formulario-inicio"
            >

                <input
                    type="text"
                    id="nombre"
                    class="input-nombre"
                    autocomplete="off"
                >

                <button
                    type="submit"
                    class="boton-entrar"
                >
                    Entrar
                </button>

            </form>

            <p
                id="mensajeError"
                class="mensaje-error"
            ></p>

        </section>

    </main>

    <script src="js/inicio.js"></script>

</body>

</html>
